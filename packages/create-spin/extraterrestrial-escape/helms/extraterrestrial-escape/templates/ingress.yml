apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: "{{ .Release.Name }}-ingress"
  annotations:
    cert-manager.io/cluster-issuer: bytel-internal-pki-vault
    kubernetes.io/ingress.class: nginx-internal-controller
spec:
  tls:
    - hosts:
        - "{{ .Values.environment }}.{{ .Values.domain }}"
      secretName: "{{ .Release.Name }}-tls-certificate"
  rules:
  {{- range .Values.ingress.rules }}
    - host: "{{ .Values.environment }}.www.{{ .Values.domain }}"
      http:
        paths:
      {{- range .paths }}
          - path: {{ .path }}
            pathType: Prefix
            backend:
              service:
                name: "{{ .Release.Name }}-service"
                port:
                  number: {{ .backend.service.port.number }}
      {{- end }}
  {{- end }}